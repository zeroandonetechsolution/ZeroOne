<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Zero & One</title>
    <link rel="icon" href="assets/images/zero-and-one-logo.jpeg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 120px 20px 60px; box-sizing: border-box; }
        .submit-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            color: #fff; 
            margin-top: 35px; 
            padding: 16px;
            font-size: 1.1rem;
            box-shadow: 0 4px 25px rgba(239, 68, 68, 0.4);
        }
        .auth-header { text-align: center; margin-bottom: 45px; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; }
        .admin-tag { 
            background: rgba(239, 68, 68, 0.1); color: var(--admin); padding: 4px 12px; 
            border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            display: inline-block; margin-bottom: 15px; border: 1px solid rgba(239, 68, 68, 0.2);
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="auth-page admin-theme">
    <!-- 1M+ Aura GPU Shader -->
    <canvas id="aurora-canvas" class="masked"></canvas>
    <div class="torch-cursor-img" id="torch-cursor-img"></div>

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img src="assets/images/zero-and-one-logo.jpeg" alt="Zero & One Tech Solutions Logo" class="logo-img">
                Zero & One Tech Solutions Pvt Ltd<span class="highlight">.</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html#home" class="nav-link">Home</a></li>
                    <li><a href="user-login.html" class="nav-link">User Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="bg-glow"></div>
    <main class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="admin-tag">Security Console</div>
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; margin-bottom: 8px;">Admin <span class="gradient-text" style="background: linear-gradient(90deg, #ef4444, #b91c1c); -webkit-background-clip: text; background-clip: text;">Access</span></h1>
                <p style="color: #a1a1aa; font-weight: 400;">Authorized system administrators only</p>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <label>Admin ID</label>
                    <input type="text" id="email" class="auth-input" placeholder="Enter Admin Username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label>Security Key</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <div id="auth-error" class="error-msg"></div>

                <button type="submit" id="submit-btn" class="btn-premium submit-btn">Authenticate</button>
            </form>
        </div>
    </main>

    <script src="core.js"></script>
    <script src="script.js"></script>
    <script src="auth-handler.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Failed:', err));
      }
    </script>
</body>
</html>
