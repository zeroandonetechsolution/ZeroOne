<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Zero & One</title>
    <link rel="icon" href="assets/images/zero-and-one-logo.jpeg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 120px 20px 60px; box-sizing: border-box; }
        .submit-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #6366f1, #4f46e5); 
            color: #fff; 
            margin-top: 35px; 
            padding: 16px;
            font-size: 1.1rem;
            box-shadow: 0 4px 25px rgba(99, 102, 241, 0.4); 
        }
        .auth-header { text-align: center; margin-bottom: 45px; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body class="auth-page">
    <!-- 1M+ Aura GPU Shader -->
    <canvas id="aurora-canvas" class="masked"></canvas>
    <div class="torch-cursor-img" id="torch-cursor-img"></div>

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img src="assets/images/zero-and-one-logo.jpeg" alt="Zero & One Tech Solutions Logo" class="logo-img">
                Zero & One Tech Solutions Pvt Ltd<span class="highlight">.</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html#home" class="nav-link">Home</a></li>
                    <li><a href="admin-login.html" class="nav-link">Admin Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="bg-glow"></div>
    <main class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <img src="assets/images/zero-and-one-logo.jpeg" alt="Logo" style="width: 70px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 8px;">Customer <span class="gradient-text" style="background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; background-clip: text;">Portal</span></h1>
                <p style="color: #a1a1aa; font-weight: 400;">Access your billing and project status</p>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <label>Mobile Number (Username)</label>
                    <input type="text" id="email" class="auth-input" placeholder="Enter your registered mobile" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label>Your Name (Password)</label>
                    <input type="password" id="password" class="auth-input" placeholder="Enter your full name as password" required autocomplete="current-password">
                </div>
                
                <div id="auth-error" class="error-msg"></div>

                <button type="submit" id="submit-btn" class="btn-premium submit-btn">Authenticate</button>
            </form>
        </div>
    </main>

    <script src="core.js"></script>
    <script src="script.js"></script>
    <script src="auth-handler.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Failed:', err));
      }
    </script>
</body>
</html>
